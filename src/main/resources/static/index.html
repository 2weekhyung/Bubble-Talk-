<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>BubbleTalk WebSocket Test</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/sockjs-client/1.6.1/sockjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/stomp.js/2.3.3/stomp.min.js"></script>
</head>
<body>
    <h2>🗨️ BubbleTalk WebSocket Test</h2>
    
    <div>
        <input type="text" id="message" placeholder="메시지를 입력하세요..." onkeypress="handleKey(event)">
        <button onclick="sendMessage()">보내기</button>
    </div>
    
    <div id="messages" style="margin-top: 20px; border: 1px solid #ccc; height: 300px; overflow-y: auto; padding: 10px;">
    </div>

    <script>
        var stompClient = null;

        function connect() {
            // WebSocketConfig에 설정한 엔드포인트: /ws-bubble
            var socket = new SockJS('/ws-bubble');
            stompClient = Stomp.over(socket);
            
            stompClient.connect({}, function (frame) {
                console.log('Connected: ' + frame);
                // 서버가 보내는 메시지를 구독: /topic/messages
                stompClient.subscribe('/topic/messages', function (chat) {
                    showGreeting(JSON.parse(chat.body));
                });
            });
        }

        function sendMessage() {
            var content = document.getElementById('message').value;
            if (content && stompClient) {
                // 서버의 컨트롤러 Mapping: /app/chat
                stompClient.send("/app/chat", {}, JSON.stringify({
                    'senderIp': '익명유저',
                    'content': content
                }));
                document.getElementById('message').value = '';
            }
        }

        function showGreeting(message) {
            var msgDiv = document.getElementById('messages');
            var p = document.createElement('p');
            p.style.wordWrap = 'break-word';
            p.appendChild(document.createTextNode(
                '[' + message.senderIp + '] ' + message.content + ' (' + message.timestamp + ')'
            ));
            msgDiv.appendChild(p);
            msgDiv.scrollTop = msgDiv.scrollHeight;
        }

        function handleKey(event) {
            if (event.keyCode === 13) {
                sendMessage();
            }
        }

        // 페이지 접속 시 자동 연결
        connect();
    </script>
</body>
</html>
